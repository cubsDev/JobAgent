<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAgent - Automate Your Search</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Marked.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Brand & Links -->
                <div class="flex items-center space-x-8">
                    <a href="/" class="flex-shrink-0 flex items-center space-x-2">
                        <svg class="w-8 h-8 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <span class="font-bold text-xl tracking-tight text-gray-900">JobAgent</span>
                    </a>
                    <div class="hidden md:flex space-x-4 border-l border-gray-200 pl-4">
                        <a href="/" class="text-gray-600 hover:text-brand-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">Dashboard</a>
                        <a href="/settings" class="text-gray-600 hover:text-brand-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">Settings</a>
                    </div>
                </div>

                <!-- Actions & Status -->
                <div class="flex items-center space-x-4">
                    <!-- Ollama Status Indicator -->
                    <div class="flex items-center space-x-2 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-200" title="Ollama Status">
                        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Ollama</span>
                        <div id="ollama-status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-300 shadow-inner"></div>
                    </div>
                    
                    <!-- Run Pipeline Button -->
                    <button id="run-pipeline-btn" class="bg-brand-600 hover:bg-brand-500 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition-all focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>Run Now</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Status Bar (Hidden by Default) -->
    <div id="pipeline-status-bar" class="hidden bg-brand-50 border-b border-brand-200 py-3 px-4 sm:px-6 lg:px-8 shadow-inner transition-all duration-300">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <svg class="animate-spin h-5 w-5 text-brand-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span id="pipeline-status-text" class="text-sm font-semibold text-brand-800 tracking-wide">Pipeline is running...</span>
            </div>
            <div class="text-xs font-mono font-bold text-brand-600 bg-brand-100 px-2 py-1 rounded shadow-sm" id="pipeline-status-progress"></div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <p class="text-center text-sm text-gray-500">
                Automated Job Search & CV Tailoring Pipeline
            </p>
        </div>
    </footer>

    <!-- Global Scripts -->
    <script>
        // Check Ollama status
        async function checkOllamaStatus() {
            const dot = document.getElementById('ollama-status-dot');
            try {
                const response = await fetch('/api/ollama_status');
                const data = await response.json();
                if (data.status === 'up') {
                    dot.classList.remove('bg-gray-300', 'bg-red-500');
                    dot.classList.add('bg-green-500', 'animate-pulse');
                } else {
                    dot.classList.remove('bg-gray-300', 'bg-green-500', 'animate-pulse');
                    dot.classList.add('bg-red-500');
                }
            } catch (error) {
                dot.classList.remove('bg-gray-300', 'bg-green-500', 'animate-pulse');
                dot.classList.add('bg-red-500');
            }
        }

        // Run Check
        checkOllamaStatus();
        setInterval(checkOllamaStatus, 30000); // Check every 30s
        
        // Pipeline Status Polling
        let isPipelineKnownToRun = false;
        
        async function checkPipelineStatus() {
            try {
                const response = await fetch('/api/pipeline_status');
                const data = await response.json();
                
                const statusBar = document.getElementById('pipeline-status-bar');
                const statusText = document.getElementById('pipeline-status-text');
                const progressText = document.getElementById('pipeline-status-progress');
                const btn = document.getElementById('run-pipeline-btn');
                
                if (data.is_running) {
                    // Show Bar
                    statusBar.classList.remove('hidden');
                    statusText.textContent = data.message;
                    
                    if (data.total > 0 && data.progress > 0) {
                        progressText.textContent = `${data.progress} / ${data.total}`;
                        progressText.classList.remove('hidden');
                    } else {
                        progressText.classList.add('hidden');
                    }
                    
                    // Lock Button
                    if (!isPipelineKnownToRun) {
                        isPipelineKnownToRun = true;
                        btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Scanning...`;
                        btn.disabled = true;
                        btn.classList.add('opacity-75', 'cursor-not-allowed');
                    }
                } else {
                    // Hide Bar
                    statusBar.classList.add('hidden');
                    
                    if (isPipelineKnownToRun) {
                        // Pipeline just completed!
                        isPipelineKnownToRun = false;
                        btn.innerHTML = `<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Complete! Reloading...`;
                        btn.classList.replace('bg-brand-600', 'bg-green-600');
                        setTimeout(() => {
                            window.location.reload();
                        }, 1500);
                    }
                }
            } catch (error) {
                console.error("Status polling failed", error);
            }
        }
        
        setInterval(checkPipelineStatus, 1500); // Check every 1.5s
        checkPipelineStatus();

        // Run Pipeline Handler
        document.getElementById('run-pipeline-btn').addEventListener('click', async () => {
            try {
                // Instantly trigger check loop to lock UI
                await fetch('/run-now', { method: 'POST' });
                checkPipelineStatus();
            } catch (error) {
                alert("Failed to start pipeline.");
            }
        });
    </script>
</body>
</html>
